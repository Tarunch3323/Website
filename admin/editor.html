<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article Editor · PatternLab CMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#F4F6F9;--surface:#fff;--surface-2:#F8FAFC;--border:#E8ECF0;--border-strong:#D1D9E0;
      --text:#0F172A;--text-2:#475569;--text-3:#94A3B8;
      --brand:#5189f3;--brand-h:#3a6fd8;--brand-subtle:#EEF3FE;
      --success:#22c55e;--success-bg:#F0FDF4;--success-border:#BBF7D0;
      --warning:#F59E0B;--warning-bg:#FFFBEB;
      --danger:#EF4444;--danger-bg:#FEF2F2;--danger-border:#FECACA;
      --dark:#0F172A;
      --r4:4px;--r6:6px;--r8:8px;--r10:10px;--r12:12px;--rfull:9999px;
      --sh1:0 1px 3px rgba(0,0,0,.06);--sh2:0 4px 16px rgba(0,0,0,.08);
      --topbar:52px;--navw:224px
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}

    /* TOPBAR */
    .topbar{height:var(--topbar);background:var(--dark);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.07)}
    .back-link{display:flex;align-items:center;gap:5px;color:rgba(255,255,255,.45);font-size:12px;text-decoration:none;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:var(--r6);padding:5px 10px;white-space:nowrap;transition:all 150ms;flex-shrink:0}
    .back-link:hover{color:#fff;background:rgba(255,255,255,.1)}
    .topbar-title{font-size:13px;font-weight:600;color:rgba(255,255,255,.65);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
    .save-state{font-size:11px;color:rgba(245,158,11,.75);white-space:nowrap;flex-shrink:0}
    .btn{display:inline-flex;align-items:center;gap:5px;font-family:inherit;font-weight:600;border:none;cursor:pointer;transition:all 150ms;font-size:13px;border-radius:var(--r8);padding:7px 13px;white-space:nowrap;text-decoration:none}
    .btn-primary{background:var(--brand);color:#fff}
    .btn-primary:hover{background:var(--brand-h)}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed}
    .btn-ghost-dark{background:rgba(255,255,255,.07);color:rgba(255,255,255,.65);border:1px solid rgba(255,255,255,.1)}
    .btn-ghost-dark:hover{background:rgba(255,255,255,.12);color:#fff}
    .btn-ghost{background:var(--surface);color:var(--text-2);border:1px solid var(--border)}
    .btn-ghost:hover{background:var(--bg)}
    .btn-sm{padding:5px 10px;font-size:12px;border-radius:var(--r6)}
    .btn-xs{padding:3px 8px;font-size:11px;border-radius:var(--r6)}
    .btn-danger-xs{background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-border);padding:3px 8px;font-size:11px;border-radius:var(--r6)}
    .btn-danger-xs:hover{background:#FEE2E2}

    /* LAYOUT */
    .editor{display:flex;flex:1;overflow:hidden}

    /* LEFT NAV */
    .nav-panel{width:var(--navw);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
    .np-section{padding:12px 10px 6px}
    .np-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);padding:0 6px;margin-bottom:5px}
    .sec-item{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:var(--r6);cursor:pointer;transition:all 120ms;position:relative}
    .sec-item:hover{background:var(--bg)}
    .sec-item.active{background:var(--brand-subtle)}
    .sec-num{font-size:9.5px;font-weight:700;border-radius:var(--r4);padding:1px 5px;border:1px solid var(--border);background:var(--bg);color:var(--text-3);flex-shrink:0;min-width:22px;text-align:center;transition:all 120ms}
    .sec-item.active .sec-num{background:var(--brand-subtle);border-color:var(--brand);color:var(--brand)}
    .sec-name{font-size:12.5px;font-weight:500;color:var(--text-2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color 120ms}
    .sec-item.active .sec-name{color:var(--brand);font-weight:600}
    .sec-btns{display:flex;gap:1px;opacity:0;transition:opacity 120ms;flex-shrink:0}
    .sec-item:hover .sec-btns{opacity:1}
    .sec-item.active .sec-btns{opacity:1}
    .sb{width:17px;height:17px;display:flex;align-items:center;justify-content:center;border:none;background:none;cursor:pointer;border-radius:3px;color:var(--text-3);font-size:10px;transition:all 100ms}
    .sb:hover{background:var(--border);color:var(--text)}
    .sb.del:hover{background:var(--danger-bg);color:var(--danger)}
    .add-sec{display:flex;align-items:center;gap:6px;padding:7px 8px;border-radius:var(--r6);cursor:pointer;color:var(--brand);font-size:12.5px;font-weight:600;border:none;background:none;font-family:inherit;width:100%;transition:background 120ms}
    .add-sec:hover{background:var(--brand-subtle)}
    .np-div{height:1px;background:var(--border);margin:6px 10px}
    .meta-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--r6);cursor:pointer;font-size:12.5px;font-weight:500;color:var(--text-2);transition:all 120ms;border:none;background:none;font-family:inherit;width:100%;text-align:left}
    .meta-item:hover{background:var(--bg);color:var(--text)}
    .meta-item.active{background:var(--brand-subtle);color:var(--brand);font-weight:600}
    .mi-icon{width:14px;height:14px;flex-shrink:0;opacity:.6}
    .meta-item.active .mi-icon{opacity:1}
    .meta-vis{margin-left:auto;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:var(--r4);flex-shrink:0;transition:all 120ms;padding:0;pointer-events:all}
    .meta-vis:hover{background:rgba(0,0,0,.06)}
    .meta-item.meta-hidden{opacity:.45}
    .meta-item.meta-hidden .meta-vis{opacity:1}
    .hidden-notice{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r8);padding:12px 14px;margin-bottom:20px;font-size:12.5px;color:var(--text-2)}
    .hidden-notice svg{flex-shrink:0;color:var(--text-3)}
    .hn-btn{margin-left:auto;font-size:12px;font-weight:600;color:var(--brand);background:none;border:none;cursor:pointer;padding:0;white-space:nowrap;font-family:inherit}
    .hn-btn:hover{text-decoration:underline}
    .np-footer{margin-top:auto;padding:10px 12px;border-top:1px solid var(--border)}
    .np-footer p{font-size:11px;color:var(--text-3)}

    /* CONTENT PANEL */
    .content-panel{flex:1;overflow-y:auto}
    .content-inner{padding:22px 24px;max-width:860px}

    /* FORM */
    .field{margin-bottom:13px}
    .field:last-child{margin-bottom:0}
    .field-row{display:grid;grid-template-columns:1fr 1fr;gap:11px}
    .field-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    .lbl{display:block;font-size:11.5px;font-weight:600;color:var(--text-2);margin-bottom:4px;letter-spacing:.02em}
    .inp,.sel,.ta{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--r8);padding:8px 11px;font-size:13px;font-family:inherit;color:var(--text);outline:none;transition:border-color 150ms,background 150ms}
    .inp:focus,.sel:focus,.ta:focus{border-color:var(--brand);background:#fff;box-shadow:0 0 0 3px rgba(81,137,243,.08)}
    .inp.mono,.ta.code{font-family:ui-monospace,'SF Mono',Consolas,monospace;font-size:12px}
    .ta{resize:vertical;min-height:80px;line-height:1.55}
    .ta.tall{min-height:140px}
    .hint{font-size:11px;color:var(--text-3);margin-top:3px;line-height:1.4}
    .sec-divider{height:1px;background:var(--border);margin:18px 0}
    .sub-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px}

    /* SECTION HEADER */
    .sec-header-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r12);padding:18px;margin-bottom:18px;box-shadow:var(--sh1)}
    .shc-row{display:grid;grid-template-columns:80px 1fr;gap:10px;align-items:center;margin-bottom:10px}
    .shc-row:last-child{margin-bottom:0}
    .shc-lbl{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-3)}

    /* BLOCKS */
    .blocks-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .blocks-hd-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3)}
    .block-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r10);margin-bottom:10px;overflow:hidden;box-shadow:var(--sh1);transition:border-color 150ms}
    .block-card:hover{border-color:var(--border-strong)}
    .block-hd{display:flex;align-items:center;gap:8px;padding:10px 13px;background:var(--surface-2);border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
    .block-card.collapsed .block-hd{border-bottom-color:transparent}
    .block-card.collapsed .block-body{display:none}
    .collapse-chevron{transition:transform 180ms;color:var(--text-3);flex-shrink:0}
    .block-card.collapsed .collapse-chevron{transform:rotate(-90deg)}
    .block-badge{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:var(--bg);border:1px solid var(--border);border-radius:var(--rfull);padding:2px 8px;color:var(--text-3);flex-shrink:0}
    .block-preview{font-size:12px;color:var(--text-3);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .block-actions{display:flex;align-items:center;gap:2px;flex-shrink:0}
    .ba{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border:none;background:none;cursor:pointer;border-radius:var(--r4);color:var(--text-3);font-size:11px;transition:all 100ms}
    .ba:hover{background:var(--border);color:var(--text)}
    .ba.del:hover{background:var(--danger-bg);color:var(--danger)}
    .block-body{padding:14px}

    /* LIST ITEMS */
    .items-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
    .list-item{background:var(--bg);border:1px solid var(--border);border-radius:var(--r8);padding:12px}
    .li-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
    .li-num{font-size:10px;font-weight:700;background:var(--border);border-radius:var(--rfull);padding:1px 7px;color:var(--text-3)}
    .li-del{margin-left:auto;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border:none;background:none;cursor:pointer;color:var(--text-3);border-radius:var(--r4);transition:all 100ms}
    .li-del:hover{background:var(--danger-bg);color:var(--danger)}
    .add-item{display:flex;align-items:center;gap:5px;color:var(--brand);font-size:12px;font-weight:600;border:none;background:none;cursor:pointer;font-family:inherit;padding:4px 0;transition:color 120ms}
    .add-item:hover{color:var(--brand-h)}

    /* ADD BLOCK DROPDOWN */
    .add-block-wrap{position:relative;margin-top:8px}
    .block-menu{position:absolute;top:calc(100% + 6px);left:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r10);box-shadow:var(--sh2);padding:5px;z-index:60;min-width:220px;display:none}
    .block-menu.open{display:block;animation:menuIn 120ms ease}
    @keyframes menuIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
    .bm-item{display:flex;align-items:center;gap:10px;padding:8px 9px;border-radius:var(--r6);cursor:pointer;transition:background 100ms}
    .bm-item:hover{background:var(--bg)}
    .bm-icon{width:26px;height:26px;border-radius:var(--r6);background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .bm-text .bm-label{font-size:12.5px;font-weight:600;color:var(--text)}
    .bm-text .bm-desc{font-size:11px;color:var(--text-3)}

    /* META FORM */
    .meta-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r12);padding:20px;margin-bottom:16px;box-shadow:var(--sh1)}
    .meta-card-title{font-size:13.5px;font-weight:700;color:var(--text);padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:16px}
    .meta-card-desc{font-size:12.5px;color:var(--text-3);margin-top:-10px;margin-bottom:16px}

    /* RELATED */
    .related-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r8);cursor:pointer;transition:all 150ms;margin-bottom:7px}
    .related-item:hover{border-color:var(--border-strong);background:var(--surface)}
    .related-item.sel{background:var(--brand-subtle);border-color:var(--brand)}
    .ri-check{width:16px;height:16px;border-radius:var(--r4);border:2px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 150ms}
    .related-item.sel .ri-check{background:var(--brand);border-color:var(--brand)}

    /* EMPTY / PROMPT */
    .empty-prompt{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;min-height:400px}
    .empty-prompt svg{width:44px;height:44px;color:var(--border-strong);margin-bottom:14px}
    .empty-prompt h3{font-size:16px;font-weight:600;color:var(--text-2);margin-bottom:6px}
    .empty-prompt p{font-size:13px;color:var(--text-3);max-width:280px;line-height:1.5}

    /* TOAST */
    .toast-wrap{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column-reverse;gap:8px;z-index:999;pointer-events:none}
    .toast{display:flex;align-items:center;gap:9px;background:var(--dark);color:#fff;padding:10px 15px;border-radius:var(--r10);font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:toastIn 200ms ease;min-width:200px}
    .toast-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
    .toast.success .toast-dot{background:var(--success)}
    .toast.danger .toast-dot{background:var(--danger)}
    .toast.warning .toast-dot{background:var(--warning)}
    @keyframes toastIn{from{opacity:0;transform:translateY(8px) scale(.96)}to{opacity:1;transform:none}}

    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:var(--rfull)}
  </style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <img src="/assets/logo-full-white.png" alt="PatternLab" height="24" style="display:block;flex-shrink:0;margin-right:4px">
  <a href="/admin" class="back-link">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
    Articles
  </a>
  <div class="topbar-title" id="topbar-title">Loading…</div>
  <span class="save-state" id="save-state"></span>
  <a href="/blog" target="_blank" class="btn btn-ghost-dark btn-sm">Preview ↗</a>
  <button class="btn btn-primary btn-sm" id="save-btn" onclick="saveAll()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>
    Save
  </button>
</header>

<div class="editor">
  <!-- LEFT NAV -->
  <nav class="nav-panel">
    <div class="np-section">
      <div class="np-label">Sections</div>
      <div id="sections-nav"></div>
      <button class="add-sec" onclick="addSection()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Section
      </button>
    </div>
    <div class="np-div"></div>
    <div class="np-section">
      <div class="np-label">Article Data</div>
      <button class="meta-item" id="mnav-fm" onclick="selectMeta('fm')">
        <svg class="mi-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span style="flex:1;text-align:left">Featured Metrics</span>
        <span class="meta-vis" id="mvis-fm" onclick="toggleMetaHide('fm',event)" title="Toggle visibility on live page"></span>
      </button>
      <button class="meta-item" id="mnav-ms" onclick="selectMeta('ms')">
        <svg class="mi-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span style="flex:1;text-align:left">Metrics Strip</span>
        <span class="meta-vis" id="mvis-ms" onclick="toggleMetaHide('ms',event)" title="Toggle visibility on live page"></span>
      </button>
      <button class="meta-item" id="mnav-snap" onclick="selectMeta('snap')">
        <svg class="mi-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        <span style="flex:1;text-align:left">Company Snapshot</span>
        <span class="meta-vis" id="mvis-snap" onclick="toggleMetaHide('snap',event)" title="Toggle visibility on live page"></span>
      </button>
      <button class="meta-item" id="mnav-rel" onclick="selectMeta('rel')">
        <svg class="mi-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        <span style="flex:1;text-align:left">Related Articles</span>
        <span class="meta-vis" id="mvis-rel" onclick="toggleMetaHide('rel',event)" title="Toggle visibility on live page"></span>
      </button>
    </div>
    <div class="np-footer"><p>Ctrl+S to save</p></div>
  </nav>

  <!-- CONTENT PANEL -->
  <div class="content-panel">
    <div class="content-inner" id="content-area">
      <div class="empty-prompt">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <h3>Select a section to edit</h3>
        <p>Choose a section from the left, or add a new one to start building your article.</p>
      </div>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
let ART = {};              // working article copy
let ALL = [];              // all articles (for related picker)
let ACTIVE = null;         // { kind:'section'|'meta', val:idx|key }
let isDirty = false;
let blockMenuOpen = false;
const AID = new URLSearchParams(location.search).get('id');

// ── BOOT ──────────────────────────────────────────────────────────────────
async function init() {
  if (!AID) { showErr('No article ID. <a href="/admin">← Back</a>'); return; }
  try {
    [ART, ALL] = await Promise.all([
      fetch('/api/articles/' + AID).then(r => { if (!r.ok) throw 0; return r.json(); }),
      fetch('/api/articles').then(r => r.json())
    ]);
    ART.sections         = ART.sections         || [];
    ART.featuredMetrics  = ART.featuredMetrics   || [];
    ART.metricsStrip     = ART.metricsStrip      || [];
    ART.companySnapshot  = ART.companySnapshot   || { stats:[], details:[] };
    ART.relatedIds       = ART.relatedIds        || [];
    g('topbar-title').textContent = ART.title || 'Untitled';
    document.title = 'Editing: ' + (ART.title || 'Article');
    renderNav();
    if (ART.sections.length) selectSection(0);
  } catch { showErr('Article not found. <a href="/admin">← Back</a>'); }
}

function showErr(html) {
  g('content-area').innerHTML = `<div style="padding:60px;text-align:center;color:var(--danger)">${html}</div>`;
}

// ── NAV ───────────────────────────────────────────────────────────────────
function renderNav() {
  const secs = ART.sections || [];
  g('sections-nav').innerHTML = secs.length ? secs.map((s,i) => `
    <div class="sec-item ${isActive('section',i)?'active':''}" onclick="selectSection(${i})" id="si-${i}">
      <span class="sec-num">${esc(s.num||String(i+1).padStart(2,'0'))}</span>
      <span class="sec-name">${esc(s.label||'Untitled')}</span>
      <div class="sec-btns">
        ${i>0?`<button class="sb" title="Up" onclick="event.stopPropagation();moveSection(${i},-1)">↑</button>`:''}
        ${i<secs.length-1?`<button class="sb" title="Down" onclick="event.stopPropagation();moveSection(${i},1)">↓</button>`:''}
        <button class="sb del" title="Delete" onclick="event.stopPropagation();deleteSection(${i})">✕</button>
      </div>
    </div>`).join('')
    : '<div style="padding:4px 8px;font-size:12px;color:var(--text-3)">No sections yet</div>';

  const EYE_ON  = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
  const EYE_OFF = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
  const hm = ART.hideMeta || {};
  ['fm','ms','snap','rel'].forEach(k => {
    const navEl = g('mnav-'+k);
    const visEl = g('mvis-'+k);
    const hidden = !!hm[k];
    if (navEl) navEl.className = 'meta-item' + (isActive('meta',k)?' active':'') + (hidden?' meta-hidden':'');
    if (visEl) visEl.innerHTML = hidden ? EYE_OFF : EYE_ON;
  });
}

function isActive(kind, val) {
  return ACTIVE?.kind === kind && ACTIVE?.val === val;
}

// ── SELECTION ─────────────────────────────────────────────────────────────
function selectSection(idx) {
  ACTIVE = { kind:'section', val:idx };
  renderNav();
  renderSectionEditor(idx);
}

function toggleMetaHide(key, e) {
  if (e) e.stopPropagation();
  if (!ART.hideMeta) ART.hideMeta = {};
  ART.hideMeta[key] = !ART.hideMeta[key];
  dirty();
  renderNav();
  if (ACTIVE?.kind === 'meta' && ACTIVE?.val === key) renderMetaEditor(key);
}

function selectMeta(key) {
  ACTIVE = { kind:'meta', val:key };
  renderNav();
  renderMetaEditor(key);
}

// ── SECTION CRUD ──────────────────────────────────────────────────────────
function addSection() {
  const i = ART.sections.length;
  ART.sections.push({
    id: 's-section-' + (i+1),
    num: String(i+1).padStart(2,'0'),
    label: 'New Section',
    headline: '',
    blocks: []
  });
  dirty(); renderNav(); selectSection(i);
}

function deleteSection(idx) {
  if (!confirm(`Delete "${ART.sections[idx]?.label}"?`)) return;
  ART.sections.splice(idx, 1);
  dirty(); renderNav();
  const newIdx = Math.max(0, Math.min(idx, ART.sections.length-1));
  if (ART.sections.length) selectSection(newIdx);
  else { ACTIVE=null; g('content-area').innerHTML = `<div class="empty-prompt"><p>No sections. Add one above.</p></div>`; }
}

function moveSection(idx, dir) {
  const t = idx + dir;
  if (t < 0 || t >= ART.sections.length) return;
  [ART.sections[idx], ART.sections[t]] = [ART.sections[t], ART.sections[idx]];
  dirty(); renderNav(); selectSection(t);
}

// ── SECTION EDITOR ─────────────────────────────────────────────────────────
function renderSectionEditor(sIdx) {
  const s = ART.sections[sIdx];
  if (!s) return;
  g('content-area').innerHTML = `
    <div class="sec-header-card">
      <div class="shc-row">
        <span class="shc-lbl">Number</span>
        <input class="inp mono" style="width:70px" value="${ea(s.num||'')}" oninput="sf(${sIdx},'num',this.value)" placeholder="01">
      </div>
      <div class="shc-row">
        <span class="shc-lbl">Label</span>
        <input class="inp" value="${ea(s.label||'')}" oninput="sf(${sIdx},'label',this.value);updateSecName(${sIdx},this.value)" placeholder="e.g. The Challenge">
      </div>
      <div class="shc-row">
        <span class="shc-lbl">Section ID</span>
        <input class="inp mono" value="${ea(s.id||'')}" oninput="sf(${sIdx},'id',this.value)" placeholder="s-challenge">
      </div>
      <div class="shc-row">
        <span class="shc-lbl">Headline</span>
        <input class="inp" value="${ea(s.headline||'')}" oninput="sf(${sIdx},'headline',this.value)" placeholder="Section headline shown inside article">
      </div>
    </div>

    <div class="blocks-hd">
      <span class="blocks-hd-label" id="blk-count">Blocks (${s.blocks?.length||0})</span>
    </div>
    <div id="blocks-container">
      ${renderBlocksHtml(sIdx)}
    </div>
    <div class="add-block-wrap">
      <button class="btn btn-ghost btn-sm" onclick="toggleBlockMenu(event)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Block
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="block-menu" id="block-menu">
        ${BLOCK_TYPES.map(([t,lbl,desc,ico]) => `
          <div class="bm-item" onclick="addBlock(${sIdx},'${t}')">
            <div class="bm-icon"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--brand)" stroke-width="2">${ico}</svg></div>
            <div class="bm-text"><div class="bm-label">${lbl}</div><div class="bm-desc">${desc}</div></div>
          </div>`).join('')}
      </div>
    </div>`;
}

function updateSecName(idx, val) {
  const el = document.querySelector(`#si-${idx} .sec-name`);
  if (el) el.textContent = val || 'Untitled';
}

function sf(sIdx, field, val) {
  if (ART.sections[sIdx]) { ART.sections[sIdx][field] = val; dirty(); }
}

// ── BLOCK TYPES REGISTRY ──────────────────────────────────────────────────
const BLOCK_TYPES = [
  ['prose',           'Prose',           'Paragraphs and headings',    '<path d="M4 6h16M4 12h16M4 18h7"/>'],
  ['complexity-list', 'Complexity List', 'Icon + text bullet items',   '<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/>'],
  ['pull-quote',      'Pull Quote',      'Callout quote + attribution','<path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/>'],
  ['solution-cards',  'Solution Cards',  '2×2 card grid',             '<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>'],
  ['pillar-cards',    'Pillar Cards',    'Approach / pillar grid',     '<path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/>'],
  ['results-block',   'Results Block',   'Before/after metrics',       '<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>'],
  ['image',           'Image',           'Photo with caption',         '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>']
];

// ── BLOCK MENU ────────────────────────────────────────────────────────────
function toggleBlockMenu(e) {
  e.stopPropagation();
  blockMenuOpen = !blockMenuOpen;
  g('block-menu')?.classList.toggle('open', blockMenuOpen);
}
document.addEventListener('click', () => {
  if (!blockMenuOpen) return;
  blockMenuOpen = false;
  g('block-menu')?.classList.remove('open');
});

// ── BLOCK CRUD ────────────────────────────────────────────────────────────
const DEFAULT_BLOCK = {
  'prose':           { type:'prose', html:'<p>Enter content here.</p>' },
  'complexity-list': { type:'complexity-list', items:[{icon:'🏭',iconBg:'',text:'Item text'}] },
  'pull-quote':      { type:'pull-quote', quote:'Enter quote text here.', source:'Name, Title' },
  'solution-cards':  { type:'solution-cards', items:[{title:'Solution One',text:'Description.',iconSvg:''},{title:'Solution Two',text:'Description.',iconSvg:''}] },
  'pillar-cards':    { type:'pillar-cards', items:[{num:'01',title:'First Pillar',text:'Description.'},{num:'02',title:'Second Pillar',text:'Description.'}] },
  'results-block':   { type:'results-block', eyebrow:'Results', headline:'The Numbers', sub:'90 days post-implementation', cells:[{before:'',after:'',afterColor:'green',label:'Metric'}], takeaway:'' },
  'image':           { type:'image', url:'', caption:'' }
};

function addBlock(sIdx, type) {
  blockMenuOpen = false; g('block-menu')?.classList.remove('open');
  ART.sections[sIdx].blocks.push(JSON.parse(JSON.stringify(DEFAULT_BLOCK[type] || {type})));
  dirty(); rebuildBlocksArea(sIdx);
}

function deleteBlock(sIdx, bIdx) {
  ART.sections[sIdx].blocks.splice(bIdx, 1);
  dirty(); rebuildBlocksArea(sIdx);
}

function moveBlock(sIdx, bIdx, dir) {
  const blks = ART.sections[sIdx].blocks;
  const t = bIdx + dir;
  if (t < 0 || t >= blks.length) return;
  [blks[bIdx], blks[t]] = [blks[t], blks[bIdx]];
  dirty(); rebuildBlocksArea(sIdx);
}

function rebuildBlocksArea(sIdx) {
  const c = g('blocks-container');
  const lbl = g('blk-count');
  if (c) c.innerHTML = renderBlocksHtml(sIdx);
  if (lbl) lbl.textContent = `Blocks (${ART.sections[sIdx]?.blocks?.length||0})`;
}

function renderBlocksHtml(sIdx) {
  const blks = ART.sections[sIdx]?.blocks || [];
  if (!blks.length) return '<div style="padding:16px 0;font-size:13px;color:var(--text-3)">No blocks yet. Add one below.</div>';
  return blks.map((b, bIdx) => blockCard(sIdx, bIdx, b)).join('');
}

// ── BLOCK CARD ────────────────────────────────────────────────────────────
function blockCard(sIdx, bIdx, b) {
  const total = ART.sections[sIdx].blocks.length;
  const prev = blockPreview(b);
  return `
    <div class="block-card" id="bc-${sIdx}-${bIdx}">
      <div class="block-hd" onclick="toggleCollapse(${sIdx},${bIdx})">
        <svg class="collapse-chevron" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        <span class="block-badge">${b.type}</span>
        <span class="block-preview">${prev}</span>
        <div class="block-actions">
          ${bIdx>0?`<button class="ba" title="Move up" onclick="event.stopPropagation();moveBlock(${sIdx},${bIdx},-1)">↑</button>`:''}
          ${bIdx<total-1?`<button class="ba" title="Move down" onclick="event.stopPropagation();moveBlock(${sIdx},${bIdx},1)">↓</button>`:''}
          <button class="ba del" title="Delete" onclick="event.stopPropagation();deleteBlock(${sIdx},${bIdx})">✕</button>
        </div>
      </div>
      <div class="block-body" id="bb-${sIdx}-${bIdx}">
        ${blockForm(sIdx, bIdx, b)}
      </div>
    </div>`;
}

function toggleCollapse(sIdx, bIdx) {
  g(`bc-${sIdx}-${bIdx}`)?.classList.toggle('collapsed');
}

function blockPreview(b) {
  switch(b.type) {
    case 'prose':           return stripTags(b.html||'').slice(0,80) || '(empty)';
    case 'complexity-list': return (b.items?.length||0) + ' items';
    case 'pull-quote':      return '“' + (b.quote||'').slice(0,70) + '”';
    case 'solution-cards':  return (b.items?.length||0) + ' cards';
    case 'pillar-cards':    return (b.items?.length||0) + ' pillars';
    case 'results-block':   return (b.cells?.length||0) + ' cells \xb7 ' + (b.headline||'');
    case 'image':           return b.url || '(no image)';
    default: return '';
  }
}

function stripTags(s) { return s.replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim(); }

// ── BLOCK FORMS ───────────────────────────────────────────────────────────
function blockForm(sIdx, bIdx, b) {
  switch(b.type) {
    case 'prose':           return fProse(sIdx, bIdx, b);
    case 'complexity-list': return fComplexity(sIdx, bIdx, b);
    case 'pull-quote':      return fPullQuote(sIdx, bIdx, b);
    case 'solution-cards':  return fSolutionCards(sIdx, bIdx, b);
    case 'pillar-cards':    return fPillarCards(sIdx, bIdx, b);
    case 'results-block':   return fResultsBlock(sIdx, bIdx, b);
    case 'image':           return fImage(sIdx, bIdx, b);
    default: return '<p style="color:var(--text-3);font-size:12px">Unknown block type.</p>';
  }
}

function fProse(s, b, blk) {
  return `<div class="field">
    <label class="lbl">HTML Content</label>
    <textarea class="ta tall code" oninput="sb(${s},${b},'html',this.value)">${ea(blk.html||'')}</textarea>
    <div class="hint">Supports &lt;p&gt; &lt;strong&gt; &lt;em&gt; &lt;ul&gt; &lt;li&gt; &lt;h2&gt; &lt;h3&gt; &lt;br&gt;</div>
  </div>`;
}

function fPullQuote(s, b, blk) {
  return `
    <div class="field"><label class="lbl">Quote Text</label>
      <textarea class="ta" rows="3" oninput="sb(${s},${b},'quote',this.value)">${ea(blk.quote||'')}</textarea></div>
    <div class="field"><label class="lbl">Attribution / Source</label>
      <input class="inp" value="${ea(blk.source||'')}" oninput="sb(${s},${b},'source',this.value)" placeholder="— VP Operations, Acme Corp"></div>`;
}

function fImage(s, b, blk) {
  return `
    <div class="field"><label class="lbl">Image URL</label>
      <input class="inp" value="${ea(blk.url||'')}" oninput="sb(${s},${b},'url',this.value);refreshImgPreview(${s},${b},this.value)" placeholder="/uploads/image.jpg">
      <div class="hint">Upload in <a href="/admin" target="_blank" style="color:var(--brand)">Media Library</a> then paste URL</div>
    </div>
    <div id="img-preview-${s}-${b}" style="margin:8px 0">
      ${blk.url?`<img src="${ea(blk.url)}" style="max-height:110px;border-radius:var(--r8);border:1px solid var(--border)" onerror="this.style.display='none'">`:''}
    </div>
    <div class="field"><label class="lbl">Caption</label>
      <input class="inp" value="${ea(blk.caption||'')}" oninput="sb(${s},${b},'caption',this.value)" placeholder="Optional caption"></div>`;
}

function refreshImgPreview(sIdx, bIdx, url) {
  const p = g(`img-preview-${sIdx}-${bIdx}`);
  if (p) p.innerHTML = url ? `<img src="${ea(url)}" style="max-height:110px;border-radius:var(--r8);border:1px solid var(--border)" onerror="this.style.display='none'">` : '';
}

function fComplexity(s, b, blk) {
  const items = blk.items || [];
  return `
    <div class="items-list" id="cl-${s}-${b}">
      ${items.map((it,i) => `
        <div class="list-item">
          <div class="li-head"><span class="li-num">Item ${i+1}</span>
            <button class="li-del" onclick="removeItem(${s},${b},'items',${i})">✕</button></div>
          <div class="field-row">
            <div class="field"><label class="lbl">Icon (emoji)</label>
              <input class="inp" value="${ea(it.icon||'')}" oninput="si(${s},${b},'items',${i},'icon',this.value)" placeholder="🏭"></div>
            <div class="field"><label class="lbl">Icon Background Color</label>
              <input class="inp mono" value="${ea(it.iconBg||'')}" oninput="si(${s},${b},'items',${i},'iconBg',this.value)" placeholder="#1e3a8a (optional)"></div>
          </div>
          <div class="field"><label class="lbl">Text (HTML supported)</label>

        </div>`).join('')}
    </div>
    <button class="add-item" onclick="addItem(${s},${b},'items',{icon:'📦',iconBg:'',text:'New item'})">+ Add Item</button>`;
}

function fSolutionCards(s, b, blk) {
  const items = blk.items || [];
  return `
    <div class="items-list">
      ${items.map((it,i) => `
        <div class="list-item">
          <div class="li-head"><span class="li-num">Card ${i+1}</span>
            <button class="li-del" onclick="removeItem(${s},${b},'items',${i})">✕</button></div>
          <div class="field-row">
            <div class="field"><label class="lbl">Title</label>

            <div class="field"><label class="lbl">Text</label>
              <input class="inp" value="${ea(it.text||'')}" oninput="si(${s},${b},'items',${i},'text',this.value)"></div>
          </div>
          <div class="field"><label class="lbl">Icon SVG <span style="font-weight:400;color:var(--text-3)">(optional, paste full SVG element)</span></label>
            <textarea class="ta code" rows="2" oninput="si(${s},${b},'items',${i},'iconSvg',this.value)" placeholder="<svg>...</svg>">${ea(it.iconSvg||'')}</textarea></div>
        </div>`).join('')}
    </div>
    <button class="add-item" onclick="addItem(${s},${b},'items',{title:'New Card',text:'',iconSvg:''})">+ Add Card</button>`;
}

function fPillarCards(s, b, blk) {

  return `
    <div class="items-list">
      ${items.map((it,i) => `
        <div class="list-item">
          <div class="li-head"><span class="li-num">Pillar ${i+1}</span>
            <button class="li-del" onclick="removeItem(${s},${b},'items',${i})">✕</button></div>
          <div class="field-row">

              <input class="inp mono" value="${ea(it.num||'')}" oninput="si(${s},${b},'items',${i},'num',this.value)" placeholder="01"></div>

          </div>
          <div class="field"><label class="lbl">Description</label>

      <div class="field"><label class="lbl">Eyebrow</label>

    <button class="add-item" onclick="addItem(${s},${b},'cells',{before:'',after:'',afterColor:'green',label:''})">+ Add Cell</button>
    <div class="sec-divider"></div>
    <div class="field"><label class="lbl">Takeaway <span style="font-weight:400;color:var(--text-3)">(callout text below results)</span></label>
      <textarea class="ta" rows="3" oninput="sb(${s},${b},'takeaway',this.value)" placeholder="Optional summary insight...">${ea(blk.takeaway||'')}</textarea></div>`;

// ── BLOCK STATE SETTERS ───────────────────────────────────────────────────
function sb(sIdx, bIdx, field, val) {
  const blk = ART.sections[sIdx]?.blocks[bIdx];
  if (blk) { blk[field] = val; dirty(); }
}

function si(sIdx, bIdx, arrKey, iIdx, field, val) {
  const arr = ART.sections[sIdx]?.blocks[bIdx]?.[arrKey];
  if (arr?.[iIdx] !== undefined) { arr[iIdx][field] = val; dirty(); }
}

function sci(sIdx, bIdx, cIdx, field, val) {
  si(sIdx, bIdx, 'cells', cIdx, field, val);
}

function addItem(sIdx, bIdx, arrKey, item) {
  const blk = ART.sections[sIdx]?.blocks[bIdx];
  if (!blk) return;
  blk[arrKey] = blk[arrKey] || [];
  blk[arrKey].push({...item});
  dirty();
  // Re-render just this block's body
  const bodyEl = g(`bb-${sIdx}-${bIdx}`);
  if (bodyEl) bodyEl.innerHTML = blockForm(sIdx, bIdx, blk);
}

function removeItem(sIdx, bIdx, arrKey, iIdx) {
  const blk = ART.sections[sIdx]?.blocks[bIdx];
  if (!blk?.[arrKey]) return;
  blk[arrKey].splice(iIdx, 1);
  dirty();
  const bodyEl = g(`bb-${sIdx}-${bIdx}`);
  if (bodyEl) bodyEl.innerHTML = blockForm(sIdx, bIdx, blk);
}

// ── META EDITORS ──────────────────────────────────────────────────────────
function renderMetaEditor(key) {
  const fns = { fm: metaFeaturedMetrics, ms: metaMetricsStrip, snap: metaSnapshot, rel: metaRelated };
  g('content-area').innerHTML = (fns[key] || (() => '<p>Unknown</p>'))();
}

function hiddenNotice(key, label) {
  if (!(ART.hideMeta || {})[key]) return '';
  return `<div class="hidden-notice">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
    <span><strong>${label}</strong> is hidden from the live page. Your data is saved.</span>
    <button class="hn-btn" onclick="toggleMetaHide('${key}')">Show it</button>
  </div>`;
}

function metaFeaturedMetrics() {
  const items = ART.featuredMetrics || [];
  return `<div class="meta-card">
    <div class="meta-card-title">Featured Metrics</div>
    ${hiddenNotice('fm','Featured Metrics')}
    <p class="meta-card-desc">Up to 4 chips shown on the blog listing card for this article.</p>
    <div class="items-list">
      ${items.map((m,i) => `
        <div class="list-item">
          <div class="li-head"><span class="li-num">Chip ${i+1}</span>
            <button class="li-del" onclick="ART.featuredMetrics.splice(${i},1);dirty();selectMeta('fm')">✕</button></div>
          <div class="field-row-3">
            <div class="field"><label class="lbl">Value</label>
              <input class="inp" value="${ea(m.val||'')}" oninput="ART.featuredMetrics[${i}].val=this.value;dirty()" placeholder="+11pp"></div>
            <div class="field"><label class="lbl">Label</label>
              <input class="inp" value="${ea(m.label||'')}" oninput="ART.featuredMetrics[${i}].label=this.value;dirty()" placeholder="On-time delivery"></div>
            <div class="field"><label class="lbl">Color</label>
              <select class="sel" onchange="ART.featuredMetrics[${i}].color=this.value;dirty()">
                <option value="" ${!m.color?'selected':''}>Default</option>
                <option value="green" ${m.color==='green'?'selected':''}>Green</option>
                <option value="blue" ${m.color==='blue'?'selected':''}>Blue</option>
              </select></div>
          </div>
        </div>`).join('')}
    </div>
    ${items.length < 4 ? `<button class="add-item" onclick="ART.featuredMetrics.push({val:'',label:'',color:''});dirty();selectMeta('fm')">+ Add Chip</button>` : '<p style="font-size:12px;color:var(--text-3)">Max 4 chips</p>'}
  </div>`;
}

function metaMetricsStrip() {
  const items = ART.metricsStrip || [];
  return `<div class="meta-card">
    <div class="meta-card-title">Metrics Strip</div>
    ${hiddenNotice('ms','Metrics Strip')}
    <p class="meta-card-desc">Before → After stats shown as a dark strip directly below the article hero.</p>
    <div class="items-list">
      ${items.map((m,i) => `
        <div class="list-item">
          <div class="li-head"><span class="li-num">Metric ${i+1}</span>
            <button class="li-del" onclick="ART.metricsStrip.splice(${i},1);dirty();selectMeta('ms')">✕</button></div>
          <div class="field-row">
            <div class="field"><label class="lbl">Before</label>
              <input class="inp" value="${ea(m.before||'')}" oninput="ART.metricsStrip[${i}].before=this.value;dirty()" placeholder="63%"></div>
            <div class="field"><label class="lbl">After</label>
              <input class="inp" value="${ea(m.after||'')}" oninput="ART.metricsStrip[${i}].after=this.value;dirty()" placeholder="74%"></div>
          </div>
          <div class="field-row">
            <div class="field"><label class="lbl">After Color</label>
              <select class="sel" onchange="ART.metricsStrip[${i}].afterColor=this.value;dirty()">
                <option value="" ${!m.afterColor?'selected':''}>White</option>
                <option value="green" ${m.afterColor==='green'?'selected':''}>Green</option>
                <option value="blue" ${m.afterColor==='blue'?'selected':''}>Blue</option>
              </select></div>
            <div class="field"><label class="lbl">Label</label>
              <input class="inp" value="${ea(m.label||'')}" oninput="ART.metricsStrip[${i}].label=this.value;dirty()" placeholder="On-Time Delivery"></div>
          </div>
        </div>`).join('')}
    </div>
    <button class="add-item" onclick="ART.metricsStrip.push({before:'',after:'',afterColor:'',label:''});dirty();selectMeta('ms')">+ Add Metric</button>
  </div>`;
}

function metaSnapshot() {
  const snap = ART.companySnapshot || { stats:[], details:[] };
  return `<div class="meta-card">
    <div class="meta-card-title">Company Snapshot</div>
    ${hiddenNotice('snap','Company Snapshot')}
    <p class="meta-card-desc">Sidebar block on the article page showing company stats and details.</p>
    <div class="sub-label">Stats Grid</div>
    <div class="items-list">
      ${(snap.stats||[]).map((s,i) => `
        <div class="list-item">
          <div class="li-head"><span class="li-num">Stat ${i+1}</span>
            <button class="li-del" onclick="ART.companySnapshot.stats.splice(${i},1);dirty();selectMeta('snap')">✕</button></div>
          <div class="field-row-3">
            <div class="field"><label class="lbl">Value</label>
              <input class="inp" value="${ea(s.val||'')}" oninput="ART.companySnapshot.stats[${i}].val=this.value;dirty()" placeholder="3"></div>
            <div class="field"><label class="lbl">Color</label>
              <select class="sel" onchange="ART.companySnapshot.stats[${i}].valColor=this.value;dirty()">
                <option value="" ${!s.valColor?'selected':''}>Default</option>
                <option value="green" ${s.valColor==='green'?'selected':''}>Green</option>
              </select></div>
            <div class="field"><label class="lbl">Label</label>
              <input class="inp" value="${ea(s.label||'')}" oninput="ART.companySnapshot.stats[${i}].label=this.value;dirty()" placeholder="Plants"></div>
          </div>
        </div>`).join('')}
    </div>
    <button class="add-item" onclick="ART.companySnapshot.stats.push({val:'',valColor:'',label:''});dirty();selectMeta('snap')" style="margin-bottom:20px">+ Add Stat</button>
    <div class="sec-divider"></div>
    <div class="sub-label">Detail Rows</div>
    <div class="items-list">
      ${(snap.details||[]).map((d,i) => `
        <div class="list-item">
          <div class="li-head"><span class="li-num">Detail ${i+1}</span>
            <button class="li-del" onclick="ART.companySnapshot.details.splice(${i},1);dirty();selectMeta('snap')">✕</button></div>
          <div class="field-row">
            <div class="field"><label class="lbl">Label</label>
              <input class="inp" value="${ea(d.label||'')}" oninput="ART.companySnapshot.details[${i}].label=this.value;dirty()" placeholder="Industry"></div>
            <div class="field"><label class="lbl">Value</label>
              <input class="inp" value="${ea(d.value||'')}" oninput="ART.companySnapshot.details[${i}].value=this.value;dirty()" placeholder="Frozen Food Manufacturing"></div>
          </div>
        </div>`).join('')}
    </div>
    <button class="add-item" onclick="ART.companySnapshot.details.push({label:'',value:''});dirty();selectMeta('snap')">+ Add Detail Row</button>
  </div>`;
}

function metaRelated() {
  const others = ALL.filter(a => a.id !== AID);
  const sel = ART.relatedIds || [];
  return `<div class="meta-card">
    <div class="meta-card-title">Related Articles</div>
    ${hiddenNotice('rel','Related Articles')}
    <p class="meta-card-desc">Shown in the article sidebar. Select up to 3.</p>
    ${others.map(a => {
      const isSel = sel.includes(a.id);
      return `<div class="related-item ${isSel?'sel':''}" onclick="toggleRelated('${a.id}')">
        <div class="ri-check">${isSel?`<svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg>`:''}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(a.title)}</div>
          <div style="font-size:11px;color:var(--text-3)">${esc(a.category||'')} · ${esc(a.date||'')}</div>
        </div>
        ${isSel?`<span style="font-size:10px;font-weight:700;color:var(--brand);background:var(--brand-subtle);border-radius:var(--rfull);padding:2px 8px;flex-shrink:0">Selected</span>`:''}
      </div>`;
    }).join('') || '<p style="color:var(--text-3);font-size:13px">No other articles available.</p>'}
  </div>`;
}

function toggleRelated(id) {
  if (!ART.relatedIds) ART.relatedIds = [];
  const idx = ART.relatedIds.indexOf(id);
  if (idx > -1) { ART.relatedIds.splice(idx, 1); }
  else {
    if (ART.relatedIds.length >= 3) { toast('Max 3 related articles', 'warning'); return; }
    ART.relatedIds.push(id);
  }
  dirty(); selectMeta('rel');
}

// ── SAVE ──────────────────────────────────────────────────────────────────
async function saveAll() {
  const btn = g('save-btn');
  btn.textContent = 'Saving…'; btn.disabled = true;
  try {
    const res = await fetch('/api/articles/' + AID, {
      method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(ART)
    });
    if (!res.ok) throw 0;
    clearDirty(); toast('All changes saved', 'success');
  } catch { toast('Save failed — check server', 'danger'); }
  finally {
    btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg> Save';
    btn.disabled = false;
  }
}

// ── DIRTY STATE ───────────────────────────────────────────────────────────
function dirty() {
  if (!isDirty) { isDirty = true; g('save-state').textContent = '● Unsaved'; }
}
function clearDirty() {
  isDirty = false; g('save-state').textContent = '';
}
window.addEventListener('beforeunload', e => { if (isDirty) { e.preventDefault(); e.returnValue=''; } });
document.addEventListener('keydown', e => { if ((e.ctrlKey||e.metaKey) && e.key==='s') { e.preventDefault(); saveAll(); } });

// ── HELPERS ───────────────────────────────────────────────────────────────
function g(id) { return document.getElementById(id); }
function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function ea(s) { return String(s??'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toast(msg, type='success') {
  const d = document.createElement('div');
  d.className = 'toast ' + type;
  d.innerHTML = `<span class="toast-dot"></span>${msg}`;
  g('toast-wrap').appendChild(d);
  setTimeout(() => { d.style.transition='opacity 250ms'; d.style.opacity='0'; setTimeout(()=>d.remove(),250); }, 2500);
}

init();
</script>
</body>
</html>
