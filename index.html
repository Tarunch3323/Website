<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Factory Brain — Production orchestration on a prompt</title>
  <link rel="stylesheet" href="fb-styles.css" />
  <style>
    @media (max-width: 720px) {
      .fb-navlinks { display: none !important; }
      .fb-footer-grid { grid-template-columns: 1fr 1fr !important; }
    }
    @media (max-width: 560px) {
      .fb-hide-sm { display: none !important; }
      .fb-footer-grid { grid-template-columns: 1fr !important; }
    }
    #fb-loading { position: fixed; inset: 0; display: grid; place-items: center; background: var(--bg-page); z-index: 9; }
    .fb-spin { width: 30px; height: 30px; border-radius: 50%; border: 2.5px solid var(--border); border-top-color: var(--accent); animation: fbspin .7s linear infinite; }
    @keyframes fbspin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="fb-loading"><div class="fb-spin"></div></div>

  <script>
    window.onerror = function(msg, src, line, col, err) {
      document.getElementById('fb-loading').innerHTML =
        '<div style="font-family:monospace;font-size:13px;color:#c00;background:#fff;padding:24px;max-width:700px;border-radius:8px;border:1px solid #f99">' +
        '<b>JS Error:</b><br>' + msg + '<br><br>' +
        '<b>File:</b> ' + src + '<br>' +
        '<b>Line:</b> ' + line + ' Col: ' + col +
        (err ? '<br><br><b>Stack:</b><br><pre style="white-space:pre-wrap">' + err.stack + '</pre>' : '') +
        '</div>';
    };
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="/lib/react.js"></script>
  <script src="/lib/react-dom.js"></script>
  <script src="/lib/babel.js"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="fb-mockups.jsx"></script>
  <script type="text/babel" src="fb-sections.jsx"></script>
  <script type="text/babel" src="fb-sections2.jsx"></script>
  <script type="text/babel" src="fb-app.jsx" data-presets="react"></script>
</body>
</html>
